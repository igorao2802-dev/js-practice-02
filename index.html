<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>JS Practice 02 - Junior Edition</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <!-- Кнопка переключения темы -->
    <button
      id="theme-toggle"
      style="position: absolute; top: 20px; right: 20px"
    >
      &#127769; Тёмная тема
    </button>
    <div class="container">
      <!-- блок для статусов и общих сообщений -->

      <h1>Практическая работа №2: Логика</h1>

      <!-- Задание 1: Валидатор -->
      <section class="card" aria-labelledby="validatorTitle">
        <h3 id="validatorTitle">Задание 1: Валидация входа</h3>
        <div class="form-group">
          <input
            type="number"
            id="ageInput"
            name="age"
            min="0"
            max="130"
            inputmode="numeric"
            placeholder="Ваш возраст"
            aria-describedby="loginResult"
          />
          <input
            type="password"
            id="passInput"
            name="password"
            placeholder="Пароль (мин. 6 симв., буквы и цифры)"
            minlength="6"
            pattern="(?=.*\d)(?=.*[A-Za-z]).{6,}"
            maxlength="254"
            title="Минимум 6 символов, буквы и цифры"
          />
          <input
            type="email"
            id="emailInput"
            name="email"
            placeholder="user@example.com"
            required
            pattern="^[^\s@]+@[^\s@]+\.[^\s@]+$"
            maxlength="254"
            autocomplete="email"
            title="Введите корректный email, например user@example.com"
            aria-describedby="loginResult"
          />
          <!-- aria-describedby связывает поле с блоком результата для доступности -->
          <button type="button" id="checkLoginBtn">Проверить</button>
        </div>
        <div
          id="message-login"
          class="section-message"
          role="status"
          aria-live="polite"
        ></div>
        <p id="loginResult" class="result"></p>
      </section>

      <!-- Задание 2: Скидки -->
      <section class="card" aria-labelledby="discountTitle">
        <h3 id="discountTitle">Задание 2: Расчет скидки</h3>
        <div class="form-group">
          <input
            type="text"
            id="sumInput"
            min="0"
            step="0.01"
            max="999999999.99"
            inputmode="decimal"
            maxlength="15"
            pattern="^\d+(\.\d{1,2})?$"
            placeholder="Сумма заказа"
          />
          <button type="button" id="calculateDiscountBtn">Рассчитать</button>
        </div>
        <div
          id="message-discount"
          class="section-message"
          role="status"
          aria-live="polite"
        ></div>
        <p id="discountResult" class="result"></p>
      </section>

      <!-- Задание 3: Конвертер -->
      <section class="card" aria-labelledby="converterTitle">
        <h3 id="converterTitle">Задание 3: Конвертер (USD/EUR/RUB)</h3>
        <div class="form-group">
          <input
            type="text"  
            id="amountInput"
            name="bynAmount"
            placeholder="Сумма в BYN"
            inputmode="decimal"  
            pattern="^\d+(\.\d{1,2})?$"
            title="Введите число с максимум 2 знаками после запятой"
            maxlength="15"
            min="0"
            step="0.01"
            max="999999999.99"
          />
          <select
            id="currencySelect"
            name="currency"
            aria-describedby="convertResult"
          >
            <option value="USD">USD</option>
            <option value="EUR">EUR</option>
            <option value="RUB">RUB</option>
          </select>
          <button type="button" id="convertCurrencyBtn">Конвертировать</button>
        </div>
        <div
          id="message-convert"
          class="section-message"
          role="status"
          aria-live="polite"
        ></div>
        <p id="convertResult" class="result"></p>
      </section>

      <!-- Задание 4: Квиз -->
      <section class="card" aria-labelledby="quizTitle">
        <h3 id="quizTitle">Задание 4: Интерактивный квиз</h3>
        <button type="button" id="startQuizBtn">Начать квиз</button>
        <div
          id="message-quiz"
          class="section-message"
          role="status"
          aria-live="polite"
        ></div>
        <p id="quizResult" class="result"></p>
      </section>
    </div>
  </body>
</html>
